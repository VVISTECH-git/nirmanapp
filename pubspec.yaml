name: nirmanapp
description: NirmanApp - House Construction Tracker
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # Google Sign In
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  timeago: ^3.6.1

  # Image & File Handling
  image_picker: ^1.0.7
  file_picker: ^8.0.3
  path_provider: ^2.1.2
  path: ^1.9.0

  # Push Notifications
  firebase_core: ^2.27.1
  firebase_messaging: ^14.7.20
  flutter_local_notifications: ^17.1.2

  # Storage & Prefs
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Utilities
  uuid: ^4.3.3
  equatable: ^2.0.5
  collection: ^1.18.0
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1

  # Date & Time
  table_calendar: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1A0A04"
  image: assets/images/splash.png
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
